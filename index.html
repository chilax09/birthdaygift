<!DOCTYPE html>
<html>
<head>
<title>Memory Vault</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: black;
    color: white;
    text-align: center;
    overflow-x: hidden;
}

.center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

input {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px 20px;
    border-radius: 5px;
    border: none;
    background: hotpink;
    color: white;
    cursor: pointer;
}

#verifying, #glitchScreen, #slideshow, #messagesSection {
    display: none;
}

.glitch {
    font-size: 35px;
    animation: glitch 0.15s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 2px red; }
    50% { text-shadow: -2px -2px blue; }
    100% { text-shadow: 2px -2px lime; }
}

#slideshow {
    width: 100vw;
    height: 100vh;
    background: black;
}

#slideImage {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#messagesSection {
    padding: 80px 20px;
    max-width: 850px;
    margin: auto;
    text-align: left;
}

.messageLine {
    opacity: 0;
    margin: 18px 0;
    transition: opacity 1.2s ease;
    font-size: 19px;
    line-height: 1.6;
}

.letterImage {
    width: 100%;
    margin-top: 40px;
    opacity: 0;
    transition: opacity 2s ease;
}

h2 {
    text-align: center;
    margin-bottom: 50px;
}
</style>
</head>

<body>

<div id="login" class="center">
    <h1>🔐 Memory Vault</h1>
    <p>Identity verification required.</p>
    <input type="number" id="birthSum" placeholder="Sum of your birthday"><br>
    <input type="number" id="age" placeholder="Your age"><br>
    <button onclick="checkAccess()">Unlock</button>
    <p id="message"></p>
</div>

<div id="verifying" class="center">
    <h2>Verifying identity...</h2>
</div>

<div id="glitchScreen" class="center">
    <div id="glitchText" class="glitch">USER FOUND.</div>
    <div id="typedText" style="margin-top:20px; font-size:28px;"></div>
</div>

<div id="slideshow">
    <img id="slideImage">
</div>

<div id="messagesSection">
    <h2>💌 Heartfelt Messages</h2>
    <div id="messagesContainer"></div>
    <img src="letter1.jpeg" id="letter1" class="letterImage">
    <img src="letter2.jpeg" id="letter2" class="letterImage">
</div>

<audio id="typingSound" preload="auto" src="typing.mp3"></audio>

<script>

let typingAudio = document.getElementById("typingSound");

const photos = [
    {src:"photo1.jpeg"},
    {src:"photo5.jpg"},
    {src:"photo3.jpeg"},
    {src:"photo2.jpeg"},
    {src:"photo9.jpeg"},
    {src:"photo12.jpeg"},
    {src:"photo11.jpeg"},
    {src:"photo10.jpeg"},
    {src:"photo13.jpeg"},
    {src:"photo14.jpeg"},
    {src:"photo8.jpg"},
    {src:"photo6.jpeg"},
    {src:"photo7.jpeg"}
];

const messages = [

"Hi Keshu! Wishing you a Happy Birthday, dear! 🎉",
"You are truly a wonderful soul — always caring, always helping, and a cherished friend to everyone around you.",
"May your day be filled with joy, love and blessings.",
"With all our love, your parents.",

"",

"To my lovely bestie, Happy Birthday ❤️",
"The way you love us is really special.",
"Don’t know what to say — everything about you is special to me.",
"Hope this continues till the stars go.",
"Love you soo much Keshuu."

];

function unlockAudio() {
    typingAudio.volume = 0;
    typingAudio.play().then(() => {
        typingAudio.pause();
        typingAudio.currentTime = 0;
    }).catch(()=>{});
}

function checkAccess() {

    unlockAudio();

    if (
        document.getElementById("birthSum").value === "9" &&
        document.getElementById("age").value === "17"
    ) {

        document.getElementById("login").style.display = "none";
        document.getElementById("verifying").style.display = "block";

        setTimeout(function() {
            document.getElementById("verifying").style.display = "none";
            document.getElementById("glitchScreen").style.display = "block";
            setTimeout(startTypingSequence, 1000);
        }, 2000);

    } else {
        document.getElementById("message").innerText =
            "Access denied. Imposter detected.";
    }
}

function typeText(text, callback) {
    let i = 0;
    const typedText = document.getElementById("typedText");
    typedText.innerHTML = "";

    typingAudio.volume = 0.25;
    typingAudio.loop = true;
    typingAudio.play();

    function typing() {
        if (i < text.length) {
            typedText.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 80);
        } else {
            typingAudio.pause();
            typingAudio.currentTime = 0;
            if (callback) setTimeout(callback, 1000);
        }
    }

    typing();
}

function eraseText(callback) {
    const typedText = document.getElementById("typedText");
    let text = typedText.innerHTML;
    let i = text.length;

    function deleting() {
        if (i > 0) {
            typedText.innerHTML = text.substring(0, i - 1);
            i--;
            setTimeout(deleting, 40);
        } else if (callback) {
            setTimeout(callback, 500);
        }
    }

    deleting();
}

function startTypingSequence() {
    document.getElementById("glitchText").style.display = "none";

    typeText("Welcome Kesari Jotsna", function() {
        eraseText(function() {
            typeText("Hope you have a great 17th birthday", function() {
                eraseText(function() {
                    typeText("Sit back and enjoy the show.", function() {
                        setTimeout(function() {
                            document.getElementById("glitchScreen").style.display = "none";
                            startSlideshow();
                        }, 1000);
                    });
                });
            });
        });
    });
}

function startSlideshow() {

    document.getElementById("slideshow").style.display = "block";

    let index = 0;
    const img = document.getElementById("slideImage");

    function showSlide() {
        img.src = photos[index].src;
        index++;

        if (index >= photos.length) {
            clearInterval(slideInterval);
            setTimeout(showMessagesSection, 3000);
        }
    }

    showSlide();
    let slideInterval = setInterval(showSlide, 4000);
}

function showMessagesSection() {

    document.getElementById("slideshow").style.display = "none";
    document.getElementById("messagesSection").style.display = "block";
    document.body.style.overflowY = "auto";

    let container = document.getElementById("messagesContainer");

    messages.forEach((msg, i) => {
        let p = document.createElement("p");
        p.className = "messageLine";
        p.innerText = msg;
        container.appendChild(p);

        setTimeout(() => {
            p.style.opacity = 1;
        }, i * 1500);
    });

    setTimeout(() => {
        document.getElementById("letter1").style.opacity = 1;
    }, messages.length * 1500 + 1000);

    setTimeout(() => {
        document.getElementById("letter2").style.opacity = 1;
    }, messages.length * 1500 + 3000);
}

</script>

</body>
</html>
